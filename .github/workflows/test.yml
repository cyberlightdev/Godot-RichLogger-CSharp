name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated Godot versions to test (overrides GODOT_VERSIONS variable)'
        required: false

jobs:
  prepare:
    runs-on: [self-hosted, linux, godot]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build version matrix
        id: set-matrix
        run: |
          VERSIONS="${{ inputs.versions || vars.GODOT_VERSIONS }}"
          JSON=$(echo "$VERSIONS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -sc .)
          echo "matrix={\"godot-version\":${JSON}}" >> $GITHUB_OUTPUT
          echo "Testing versions: $VERSIONS"

  test:
    needs: prepare
    name: Test Godot ${{ matrix.godot-version }}
    runs-on: [self-hosted, linux, godot]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      GODOT_VERSION: ${{ matrix.godot-version }}
      GODOT_CACHE: /root/.godot-cache
      NUGET_PACKAGES: /root/.nuget/packages

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Clean up old Godot patch versions
        run: |
          MINOR=$(echo "${GODOT_VERSION}" | cut -d. -f1-2)
          find "${GODOT_CACHE}" -maxdepth 1 -type d \
            -name "Godot_v${MINOR}*-stable_mono_linux_x86_64" \
            ! -name "Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64" \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Download Godot ${{ matrix.godot-version }} Mono
        run: |
          DIRNAME="Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64"
          EXE="${GODOT_CACHE}/${DIRNAME}/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64"
          if [ -f "${EXE}" ]; then
            echo "Godot ${GODOT_VERSION} already cached, skipping download"
          else
            URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${DIRNAME}.zip"
            mkdir -p "${GODOT_CACHE}"
            wget -q "$URL" -O /tmp/godot.zip
            unzip -q /tmp/godot.zip -d "${GODOT_CACHE}"
            chmod +x "${EXE}"
            rm /tmp/godot.zip
          fi

      - name: Patch .csproj SDK version
        run: |
          # NuGet requires 3-part version; "4.3" -> "4.3.0"
          if [[ "${GODOT_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            NUGET_VER="${GODOT_VERSION}.0"
          else
            NUGET_VER="${GODOT_VERSION}"
          fi
          sed -i "s|Sdk=\"Godot.NET.Sdk/[0-9.]*\"|Sdk=\"Godot.NET.Sdk/${NUGET_VER}\"|" RichLogger.csproj
          echo "SDK patched to Godot.NET.Sdk/${NUGET_VER}"

      - name: Patch project.godot features version
        run: |
          MINOR=$(echo "${GODOT_VERSION}" | cut -d. -f1-2)
          sed -i "s|PackedStringArray(\"[0-9]*\.[0-9]*\", \"C#\"|PackedStringArray(\"${MINOR}\", \"C#\"|" project.godot
          echo "Features patched to ${MINOR}"

      - name: Import project
        run: |
          EXE="${GODOT_CACHE}/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64"
          "${EXE}" --headless --import --quit 2>&1 || true

      - name: Build C# solutions
        run: |
          EXE="${GODOT_CACHE}/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64"
          "${EXE}" --headless --build-solutions --quit 2>&1 || true

      - name: Run scene and check output
        run: |
          EXE="${GODOT_CACHE}/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64"
          OUTPUT=$(timeout 30s "${EXE}" --headless --path . 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qP 'INFO.*Test'; then
            echo "PASS: found INFO.*Test in output"
          else
            echo "FAIL: pattern 'INFO.*Test' not found"
            exit 1
          fi
