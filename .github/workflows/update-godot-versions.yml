name: Update Godot Versions

on:
  schedule:
    - cron: '0 4 * * *'  # Daily 04:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: [self-hosted, linux, godot]
    steps:
      - uses: actions/checkout@v6

      - name: Find latest stable Godot versions
        id: find-versions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          # Fetch all stable releases (tag format: 4.x-stable or 4.x.y-stable)
          ALL_RELEASES=$(gh api repos/godotengine/godot/releases \
            --paginate \
            --jq '[.[] | select(.prerelease==false) | select(.tag_name | test("^4\\.[0-9]+(\\.[0-9]+)?-stable$")) | .tag_name] | .[]' \
            | sort -V)

          # Discover all unique minors >= GODOT_MIN_VERSION that have stable releases
          MIN_VERSION="${{ vars.GODOT_MIN_VERSION }}"
          MINORS=$(echo "$ALL_RELEASES" \
            | sed 's/-stable$//' \
            | grep -oP '^[0-9]+\.[0-9]+' \
            | sort -uV \
            | awk -v min="$MIN_VERSION" '{
                split(min, m, "."); split($0, v, ".")
                if (v[1] > m[1] || (v[1] == m[1] && v[2] >= m[2])) print
              }')

          echo "Discovered minor versions: $(echo $MINORS | tr '\n' ' ')"

          NEW_VERSIONS=""
          for MINOR in $MINORS; do
            LATEST=$(echo "$ALL_RELEASES" \
              | grep -P "^${MINOR}(\\.[0-9]+)?-stable$" \
              | sort -V | tail -1 \
              | sed 's/-stable$//')
            if [ -n "$LATEST" ]; then
              NEW_VERSIONS="${NEW_VERSIONS:+${NEW_VERSIONS},}${LATEST}"
              echo "Godot ${MINOR}.x -> ${LATEST}"
            fi
          done

          echo "new_versions=$NEW_VERSIONS" >> $GITHUB_OUTPUT

      - name: Compare and update variable
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          NEW="${{ steps.find-versions.outputs.new_versions }}"

          CURRENT=$(gh variable get GODOT_VERSIONS --json value --jq '.value' 2>/dev/null || echo "")

          echo "Current : $CURRENT"
          echo "New     : $NEW"

          if [ "$CURRENT" = "$NEW" ]; then
            echo "No change. All versions are up to date."
          else
            echo "Updating GODOT_VERSIONS: $CURRENT -> $NEW"
            gh variable set GODOT_VERSIONS --body "$NEW"
            echo "Triggering test workflow with new versions..."
            gh workflow run test.yml --field "versions=$NEW"
          fi

      - name: Clean up outdated Godot editor cache
        run: |
          NEW="${{ steps.find-versions.outputs.new_versions }}"
          GODOT_CACHE="/root/.godot-cache"

          [ -d "$GODOT_CACHE" ] || exit 0

          EXPECTED=$(echo "$NEW" | tr ',' '\n' | sed 's/.*/Godot_v&-stable_mono_linux_x86_64/')

          find "$GODOT_CACHE" -maxdepth 1 -type d -name "Godot_v*-stable_mono_linux_x86_64" | while read DIR; do
            BASENAME=$(basename "$DIR")
            if ! echo "$EXPECTED" | grep -qF "$BASENAME"; then
              echo "Removing outdated cache: $BASENAME"
              rm -rf "$DIR"
            fi
          done
          echo "Cache cleanup complete."
